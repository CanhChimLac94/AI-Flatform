services:
  # ─── PostgreSQL with pgvector ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: omni_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: omni
      POSTGRES_PASSWORD: omni_secret
      POSTGRES_DB: omni_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omni -d omni_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: omni_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: omni_backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://omni:omni_secret@postgres:5432/omni_ai
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    # Not exposed publicly — nginx proxies through Next.js rewrites
    expose:
      - "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    container_name: omni_frontend
    restart: unless-stopped
    environment:
      # Server-only: used by Next.js rewrites to reach backend inside Docker network
      BACKEND_URL: http://backend:8000
    expose:
      - "3000"
    # volumes:
    #   - frontend_node_modules:/app/node_modules   # Persist node_modules to speed up subsequent builds
    #   - ../apps/frontend:/app/src    # Static assets can be read-only
    # ports:
    #   - "3000:3000"
    # depends_on:
    #   backend:
    #     condition: service_healthy

  # ─── nginx — single public entry point ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: omni_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── DB Admin (dev profile only) ─────────────────────────────────────────
  adminer:
    image: adminer:4.8.1
    container_name: omni_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: omni_network
